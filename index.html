<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>noburick apps | アプリ一覧</title>
  <meta name="description" content="noburick が公開するアプリの一覧ページです。">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="hero">
    <div class="hero__inner">
      <p class="hero__badge">noburick.github.io</p>
      <h1>アプリ一覧</h1>
      <p class="hero__lead">Steam風のダークUIで、公開中のアプリをまとめてチェックできます。</p>
    </div>
  </header>

  <main class="container" id="apps">
    <section class="apps-grid" aria-label="アプリ一覧">
      <article class="app-card">
        <div class="app-card__thumb">
          <img src="/uchi-neko.png" alt="ねことも！ポモドーロのアイコン">
        </div>
        <div class="app-card__body">
          <h2>ねことも！ポモドーロ</h2>
          <p>集中時間を猫と一緒に過ごすポモドーロタイマー</p>
          <a class="button" href="/apps/nekotomo/">詳細を見る</a>
        </div>
      </article>

      <article class="app-card">
        <div class="app-card__thumb">
          <img src="/irasutoya-escape.png" alt="ふりむきミリオンキャットのアイコン">
        </div>
        <div class="app-card__body">
          <h2>ふりむきミリオンキャット</h2>
          <p>超低確率で猫が振り向くネコ運試しゲーム</p>
          <a class="button" href="/apps/hurimuki/">詳細を見る</a>
        </div>
      </article>
    </section>
  </main>

  <footer class="footer">
    <p>© 2026 noburick</p>
  </footer>
</body>
</html>
