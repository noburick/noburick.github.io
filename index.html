<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>noburick apps | アプリ一覧</title>
  <meta name="description" content="noburick が公開するアプリの一覧ページです。">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="hero">
    <div class="hero__inner">
      <p class="hero__badge">noburick.github.io</p>
      <h1>アプリ一覧</h1>
      <p class="hero__lead">Steam風のダークUIで、公開中のアプリをまとめてチェックできます。</p>
    </div>
  </header>

  <main class="container" id="apps">
    <section class="apps-grid" aria-label="アプリ一覧">

      <!-- ねことも！ポモドーロ -->
      <article class="app-card">
        <div class="app-card__thumb">
          <img src="./uchi-neko.png" alt="ねことも！ポモドーロのアイコン">
        </div>
        <div class="app-card__body">
          <h2>ねことも！ポモドーロ</h2>
          <p>集中時間を猫と一緒に過ごすポモドーロタイマー</p>
          <div class="app-card__os">
            <span class="os-badge os-badge--ios">iOS</span>
            <span class="os-badge os-badge--android">Android</span>
          </div>
          <a class="button" href="./apps/nekotomo/">詳細を見る</a>
        </div>
      </article>

      <!-- ふりむきミリオンキャット -->
      <article class="app-card">
        <div class="app-card__thumb app-card__thumb--placeholder">
          <img src="./irasutoya-escape.png" alt="ふりむきミリオンキャットのアイコン" onerror="this.style.display='none'">
        </div>
        <div class="app-card__body">
          <h2>ふりむきミリオンキャット</h2>
          <p>超低確率で猫が振り向くネコ運試しゲーム</p>
          <div class="app-card__os">
            <span class="os-badge os-badge--unavailable">iOS</span>
            <span class="os-badge os-badge--android">Android</span>
          </div>
          <a class="button" href="./apps/hurimuki/">詳細を見る</a>
        </div>
      </article>

      <!-- いらすとやからの脱出 -->
      <article class="app-card">
        <div class="app-card__thumb app-card__thumb--placeholder">
          <img src="./assets/apps/irasutoya-escape/icon.png" alt="いらすとやからの脱出のアイコン" onerror="this.style.display='none'">
        </div>
        <div class="app-card__body">
          <h2>いらすとやからの脱出<br><small>-もうひとつの結末を探して-</small></h2>
          <p>いらすとや風の世界から脱出を目指す、もうひとつの結末が隠された短編脱出ゲーム。</p>
          <div class="app-card__os">
            <span class="os-badge os-badge--ios">iOS</span>
            <span class="os-badge os-badge--unavailable">Android</span>
          </div>
          <a class="button" href="./apps/irasutoya-escape/">詳細を見る</a>
        </div>
      </article>

    </section>
  </main>

  <footer class="footer">
    <p>© 2026 noburick</p>
  </footer>
</body>
</html>
