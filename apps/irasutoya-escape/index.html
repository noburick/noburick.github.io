<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>いらすとやからの脱出 -もうひとつの結末を探して- | 公式ホームページ</title>
  <meta name="description" content="いらすとや風の世界から脱出を目指す、もうひとつの結末が隠された短編脱出ゲーム。">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --panel: #121a33;
      --text: #e8edff;
      --sub: #aab4d6;
      --accent: #7c9bff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 20% 0%, #1a2550 0%, var(--bg) 56%);
      color: var(--text);
      font-family: "Hiragino Sans", "Noto Sans JP", "Yu Gothic", system-ui, -apple-system, sans-serif;
      padding: 24px;
    }
    main {
      width: min(100%, 720px);
      background: linear-gradient(160deg, rgba(124, 155, 255, 0.12), rgba(18, 26, 51, 0.92));
      border: 1px solid rgba(124, 155, 255, 0.32);
      border-radius: 20px;
      padding: 28px 24px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
    }
    .genre {
      display: inline-block;
      margin: 0 0 12px;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      background: rgba(124, 155, 255, 0.18);
      color: #a3b8ff;
      border: 1px solid rgba(124, 155, 255, 0.4);
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.5rem, 5vw, 2.1rem);
      line-height: 1.3;
    }
    h1 small {
      display: block;
      font-size: 0.65em;
      color: var(--sub);
      font-weight: 400;
      margin-top: 4px;
    }
    .lead {
      margin: 12px 0 20px;
      color: var(--sub);
      line-height: 1.8;
    }
    .os-list {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 0 0 24px;
    }
    .os-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 700;
      border: 1px solid transparent;
    }
    .os-badge--ios {
      background: rgba(10, 132, 255, 0.18);
      color: #6cb8ff;
      border-color: rgba(10, 132, 255, 0.4);
    }
    .coming-soon {
      display: inline-block;
      margin-bottom: 24px;
      padding: 10px 16px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: var(--sub);
      font-size: 0.9rem;
    }
    a.back {
      display: inline-block;
      color: #fff;
      background: var(--accent);
      text-decoration: none;
      font-weight: 700;
      border-radius: 999px;
      padding: 10px 18px;
    }
    a.back:hover { filter: brightness(1.1); }
  </style>
</head>
<body>
  <main>
    <span class="genre">脱出ゲーム</span>
    <h1>いらすとやからの脱出<small>-もうひとつの結末を探して-</small></h1>
    <p class="lead">いらすとや風の世界から脱出を目指す、もうひとつの結末が隠された短編脱出ゲーム。<br>このページは現在準備中です。</p>
    <div class="os-list">
      <span class="os-badge os-badge--ios">iOS</span>
    </div>
    <p class="coming-soon">📢 詳細情報は公開準備中です。もうしばらくお待ちください。</p><br>
    <a class="back" href="../../">アプリ一覧に戻る</a>
  </main>
</body>
</html>
