<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ふりむきミリオンキャット | 準備中</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --panel: #121a33;
      --text: #e8edff;
      --sub: #aab4d6;
      --accent: #7c9bff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 20% 0%, #1a2550 0%, var(--bg) 56%);
      color: var(--text);
      font-family: "Hiragino Sans", "Noto Sans JP", "Yu Gothic", system-ui, -apple-system, sans-serif;
      padding: 24px;
    }
    main {
      width: min(100%, 720px);
      background: linear-gradient(160deg, rgba(124, 155, 255, 0.12), rgba(18, 26, 51, 0.92));
      border: 1px solid rgba(124, 155, 255, 0.32);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
    }
    h1 { margin: 0 0 12px; font-size: clamp(1.6rem, 5vw, 2.2rem); }
    p { margin: 0; color: var(--sub); line-height: 1.8; }
    a {
      display: inline-block;
      margin-top: 18px;
      color: #fff;
      background: var(--accent);
      text-decoration: none;
      font-weight: 700;
      border-radius: 999px;
      padding: 10px 16px;
    }
  </style>
</head>
<body>
  <main>
    <h1>ふりむきミリオンキャット</h1>
    <p>超低確率で猫が振り向く、ネコ運試しゲームページです。現在準備中です。</p>
    <a href="/">アプリ一覧に戻る</a>
  </main>
</body>
</html>
